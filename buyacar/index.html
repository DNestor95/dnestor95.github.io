<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Vehicle Inquiry Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3fb;
      --panel: #ffffff;
      --text: #1a2740;
      --muted: #5a6d92;
      --accent: #0d63ff;
      --border: #d5e0f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fbff 0%, #e8f0ff 60%, #f1f5fb 100%);
      color: var(--text);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .panel {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(34, 63, 120, 0.12);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.7rem, 4vw, 2.3rem);
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      outline: 2px solid #bad2ff;
      border-color: #8bb2ff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }

    button,
    .back {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 700;
      font-family: "JetBrains Mono", monospace;
      cursor: pointer;
    }

    button {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .back {
      background: #fff;
      color: var(--text);
    }

    .note {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Vehicle Inquiry Desk</h1>
    <p>Ask questions about vehicle pricing, availability, trade-ins, or financing options.</p>

    <form action="https://formspree.io/f/xaqpeayr" method="POST">
      <div class="row">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" />
        </div>
        <div class="field">
          <label for="vehicle">Vehicle of Interest</label>
          <input id="vehicle" name="vehicle" type="text" placeholder="Example: 2022 Honda Accord" />
        </div>
      </div>

      <div class="field">
        <label for="question">Question / Inquiry</label>
        <textarea id="question" name="message" required placeholder="Tell me what you are looking for, your budget, and any must-haves."></textarea>
      </div>

      <input type="hidden" name="source" value="buyacar" />

      <div class="actions">
        <button type="submit">Send Inquiry</button>
        <a class="back" href="../modern/index.html">View My Portfolio Site</a>
      </div>
      <p class="note">If you have any questions about the form or need assistance, please contact me directly at <a href="mailto:dnestor@tristatenissan.com">dnestor@tristatenissan.com</a></p>
    </form>
  </main>
</body>
</html>
