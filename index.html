<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel Nestor Terminal</title>
  <link rel="stylesheet" href="cli.css" />
</head>
<body>
  <main class="terminal" aria-label="Terminal interface">
    <div id="output" class="output"></div>
    <div class="prompt">
      <span class="prompt-label">dnestor95@site:$</span>
      <input id="cmdInput" type="text" autocomplete="off" spellcheck="false" aria-label="Command line input" />
      <span class="cursor" aria-hidden="true"></span>
    </div>
  </main>
  <script src="cli.js"></script>
</body>
</html>
